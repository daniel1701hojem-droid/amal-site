<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMAL</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#f3eadb;
  color:#102b22;
  font-family:Georgia,serif;
  padding-bottom:125px;
}

nav{
  background:#062f25;
  color:white;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 60px;
}

.logo{
  font-size:36px;
  letter-spacing:12px;
}

nav a{
  color:white;
  text-decoration:none;
  font-family:Arial,sans-serif;
  font-size:15px;
  margin-left:30px;
}

section, header{
  max-width:1500px;
  margin:auto;
  padding:50px 50px;
}

.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  align-items:center;
}

.hero h1{
  font-size:56px;
}

.hero p, .intro, .card p, .text-section p{
  font-family:Arial,sans-serif;
  color:#111;
}

.hero img{
  width:100%;
  border-radius:18px;
}

.btn{
  display:inline-block;
  background:#063f31;
  color:white;
  padding:14px 28px;
  border-radius:999px;
  text-decoration:none;
  font-family:Arial,sans-serif;
  font-weight:bold;
}

.products{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;
}

.card{
  background:#f8f1e6;
  border:1px solid #d6c4aa;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card-content{
  padding:14px;
}

.badge{
  background:#063f31;
  color:white;
  padding:6px 12px;
  border-radius:8px;
  display:inline-block;
  margin-top:-20px;
  position:relative;
}

.price{
  font-weight:bold;
  margin:10px 0;
}

.size-label{
  font-size:13px;
}

.sizes{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.sizes button{
  border:1px solid #d6c4aa;
  background:#f7efe3;
  padding:6px 10px;
}

/* COLOR */
.colors{
  display:flex;
  gap:8px;
  margin:10px 0;
}

.color{
  width:22px;
  height:22px;
  border-radius:50%;
  border:2px solid #d6c4aa;
  cursor:pointer;
}

.color.beige{background:#d8c1a4;}
.color.cream{background:#f5f1e6;}
.color.navy{background:#1f2f46;}
.color.black{background:#111;}
.color.green{background:#1f3d2b;}

.color.active{
  border:3px solid #063f31;
}

.buy{
  display:block;
  background:#063f31;
  color:white;
  text-align:center;
  padding:10px;
  margin-top:10px;
  text-decoration:none;
}

.trust{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-top:20px;
}

.sticky-signup{
  position:fixed;
  bottom:0;
  width:100%;
  background:#063f31;
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
}

.signup-form{
  display:flex;
}

.signup-form input{
  padding:10px;
}

.signup-form button{
  padding:10px;
  background:#d8c1a4;
  border:none;
}
</style>
</head>

<body>

<nav>
<div class="logo">AMAL</div>
<div>
<a href="#shop">SHOP</a>
<a href="#materials">MATERIALS</a>
<a href="#about">ABOUT</a>
</div>
</nav>

<header class="hero">
<div>
<h1>Modern modest wear for everyday purpose.</h1>
<p>Clean silhouettes, comfortable fits and timeless essentials.</p>
<a class="btn" href="#shop">Explore</a>
</div>
<img src="https://i.imgur.com/hwgJpwE.jpg">
</header>

<section id="shop">

<div class="products">

<!-- PRODUCT TEMPLATE (repeat 5x) -->

<div class="card">
<img src="https://i.postimg.cc/P5rmdr7R/image.jpg">
<div class="card-content">
<div class="badge">Fabric</div>
<p>Premium everyday piece.</p>
<div class="price">350 kr</div>

<div class="size-label">COLOR</div>
<div class="colors">
<div class="color beige active"></div>
<div class="color cream"></div>
<div class="color navy"></div>
<div class="color black"></div>
<div class="color green"></div>
</div>

<div class="size-label">SIZE</div>
<div class="sizes">
<button>S</button><button>M</button><button>L</button><button>XL</button><button>XXL</button><button>XXXL</button>
</div>

<a class="buy" href="#">Buy</a>
</div>
</div>

<!-- copy above 4 more times -->

</div>

</section>

<div class="sticky-signup">
<div>Get early access</div>
<form class="signup-form">
<input placeholder="Email">
<button>Join</button>
</form>
</div>

<script>
document.querySelectorAll('.colors').forEach(group=>{
  group.querySelectorAll('.color').forEach(color=>{
    color.onclick=()=>{
      group.querySelectorAll('.color').forEach(c=>c.classList.remove('active'))
      color.classList.add('active')
    }
  })
})
</script>

</body>
</html>
